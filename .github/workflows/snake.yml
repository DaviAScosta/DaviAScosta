name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: DaviAScosta
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark
          snake_color: "39d353"
          snake_case: lower

      - uses: EndBug/add-and-commit@v9
        with:
          message: "chore: atualizar cobrinha de contribuições"
          default_author: github_actions
